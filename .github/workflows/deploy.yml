name: Deploy

# Publishes the experiment to GitHub Pages on every push to main.
# GitHub Pages is free and needs no external account — enable it once under
# Settings > Pages > Source: GitHub Actions (the new-experiment script does this
# automatically when it creates the repo).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Serve from /<repo-name>/ on Pages; vite.config reads BASE_PATH.
      - run: npm run build
        env:
          BASE_PATH: /${{ github.event.repository.name }}/
          VITE_ANALYTICS_PROVIDER: ${{ vars.VITE_ANALYTICS_PROVIDER }}
          VITE_ANALYTICS_DOMAIN: ${{ vars.VITE_ANALYTICS_DOMAIN }}
          VITE_ANALYTICS_WEBSITE_ID: ${{ vars.VITE_ANALYTICS_WEBSITE_ID }}
          VITE_ANALYTICS_SRC: ${{ vars.VITE_ANALYTICS_SRC }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
