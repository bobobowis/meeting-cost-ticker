<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meeting Cost Ticker — watch the money burn</title>

    <meta property="og:url" content="https://bobobowis.github.io/meeting-cost-ticker/" />
    <meta property="og:title" content="Meeting Cost Ticker — watch the money burn" />

      property="og:description"
      content="How much is this meeting actually costing? A live per-second $/€ ticker. No signup, all in your browser."
    />
    <meta
      property="og:image"
      content="https://bobobowis.github.io/meeting-cost-ticker/og.png"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:image"
      content="https://bobobowis.github.io/meeting-cost-ticker/og.png"
    />
  </head>

    <div id="root"></div>
